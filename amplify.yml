version: 1
frontend:
  phases:
    preBuild:
      commands:
        # `npm ci` performs a clean, reproducible install from package-lock.json.
        # Amplify caches node_modules between builds (see cache section below),
        # so this is fast on subsequent deploys unless dependencies changed.
        - npm ci
    build:
      commands:
        # Compiles TypeScript, runs Tailwind purge, and outputs to .next/
        - npm run build
  artifacts:
    # Amplify serves everything inside .next/ as the Next.js application.
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      # Cache installed packages so preBuild is fast when package.json hasn't changed.
      - node_modules/**/*
      # Cache Next.js compilation output to speed up incremental rebuilds.
      - .next/cache/**/*
